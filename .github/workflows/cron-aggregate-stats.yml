name: Cron — Aggregate Stats

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: POST /api/cron/aggregate-stats
        env:
          CRON_BASE_URL: ${{ vars.CRON_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_BASE_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "Set repository variable CRON_BASE_URL and secret CRON_SECRET"
            exit 1
          fi
          curl -fsS -X POST \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${CRON_BASE_URL}/api/cron/aggregate-stats"
